openapi: 3.0.3
info:
  title: Vehivle V1 API
  version: 1.0.0
  description: |
    两/三轮车渠道分销电子展厅 V1 API 契约。

    统一响应结构为 `code/message/data/requestId/timestamp`。
    管理端使用 httpOnly Cookie 鉴权：登录成功后写入 `access_token`
    和 `refresh_token`，受保护接口读取 `access_token`。
servers:
  - url: http://localhost:8080
    description: Local development server
  - url: /
    description: Same-origin deployment
tags:
  - name: Health
  - name: Admin Auth
  - name: Admin Users
  - name: Admin Vehicles
  - name: Admin Categories
  - name: Admin Param Templates
  - name: Admin System Settings
  - name: Admin Media
  - name: Public
paths:
  /health:
    get:
      tags: [Health]
      summary: 健康检查
      operationId: getHealth
      responses:
        "200":
          description: data 为 HealthData
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponse" }

  /api/v1/admin/auth/login:
    post:
      tags: [Admin Auth]
      summary: 管理端登录
      operationId: adminLogin
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        "200":
          description: data 为 LoginResult；响应头写入 access_token 与 refresh_token Cookie
          headers:
            Set-Cookie:
              description: httpOnly 认证 Cookie
              schema: { type: string }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponse" }
        "401": { $ref: "#/components/responses/AuthError" }

  /api/v1/admin/auth/refresh:
    post:
      tags: [Admin Auth]
      summary: 刷新 Access Token
      operationId: adminRefreshToken
      security:
        - refreshCookieAuth: []
      responses:
        "200":
          description: data 为 LoginResult；响应头写入新的 access_token Cookie
          headers:
            Set-Cookie:
              description: access_token httpOnly Cookie
              schema: { type: string }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponse" }
        "401": { $ref: "#/components/responses/AuthError" }

  /api/v1/admin/auth/logout:
    post:
      tags: [Admin Auth]
      summary: 退出登录并清空 Cookie
      operationId: adminLogout
      responses:
        "200":
          description: data 为空对象
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponse" }

  /api/v1/admin/auth/me:
    get:
      tags: [Admin Auth]
      summary: 获取当前登录用户
      operationId: adminMe
      security:
        - accessCookieAuth: []
      responses:
        "200":
          description: data 为 AdminUser
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponse" }
        "401": { $ref: "#/components/responses/AuthError" }

  /api/v1/admin/user:
    post:
      tags: [Admin Users]
      summary: 创建用户占位接口
      operationId: adminCreateUser
      security:
        - accessCookieAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema: { type: object, additionalProperties: true }
      responses:
        "200":
          description: 占位返回
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponse" }
        "401": { $ref: "#/components/responses/AuthError" }

  /api/v1/admin/user/{user_id}:
    parameters:
      - $ref: "#/components/parameters/UserId"
    get:
      tags: [Admin Users]
      summary: 获取用户占位接口
      operationId: adminGetUser
      security:
        - accessCookieAuth: []
      responses:
        "200":
          description: 占位返回
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponse" }
    put:
      tags: [Admin Users]
      summary: 更新用户占位接口
      operationId: adminUpdateUser
      security:
        - accessCookieAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema: { type: object, additionalProperties: true }
      responses:
        "200":
          description: 占位返回
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponse" }
    delete:
      tags: [Admin Users]
      summary: 删除用户占位接口
      operationId: adminDeleteUser
      security:
        - accessCookieAuth: []
      responses:
        "200":
          description: 占位返回
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponse" }

  /api/v1/admin/vehicles:
    get:
      tags: [Admin Vehicles]
      summary: 查询管理端车型列表
      operationId: adminListVehicles
      security:
        - accessCookieAuth: []
      parameters:
        - $ref: "#/components/parameters/Keyword"
        - $ref: "#/components/parameters/CategoryIdQuery"
        - $ref: "#/components/parameters/VehicleStatusQuery"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/SortField"
        - $ref: "#/components/parameters/SortOrder"
      responses:
        "200":
          description: data 为 ListResult<Vehicle>
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponse" }
        "401": { $ref: "#/components/responses/AuthError" }
    post:
      tags: [Admin Vehicles]
      summary: 创建车型
      operationId: adminCreateVehicle
      security:
        - accessCookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/VehicleCreateRequest" }
      responses:
        "200":
          description: data 为 Vehicle
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponse" }
        "401": { $ref: "#/components/responses/AuthError" }

  /api/v1/admin/vehicles/batch-status:
    post:
      tags: [Admin Vehicles]
      summary: 批量设置车型状态
      operationId: adminBatchVehicleStatus
      security:
        - accessCookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/VehicleBatchStatusRequest" }
      responses:
        "200":
          description: "data is { ok: true }"
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponse" }
        "401": { $ref: "#/components/responses/AuthError" }

  /api/v1/admin/vehicles/{vehicle_id}:
    parameters:
      - $ref: "#/components/parameters/VehicleId"
    put:
      tags: [Admin Vehicles]
      summary: 更新车型
      operationId: adminUpdateVehicle
      security:
        - accessCookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/VehicleUpdateRequest" }
      responses:
        "200":
          description: data 为 Vehicle
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponse" }
        "401": { $ref: "#/components/responses/AuthError" }
    delete:
      tags: [Admin Vehicles]
      summary: 软删除车型
      operationId: adminDeleteVehicle
      security:
        - accessCookieAuth: []
      responses:
        "200":
          description: "data is { ok: true }"
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponse" }
        "401": { $ref: "#/components/responses/AuthError" }

  /api/v1/admin/vehicles/{vehicle_id}/publish:
    parameters:
      - $ref: "#/components/parameters/VehicleId"
    post:
      tags: [Admin Vehicles]
      summary: 发布车型
      operationId: adminPublishVehicle
      security:
        - accessCookieAuth: []
      responses:
        "200":
          description: "data is { ok: true }"
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponse" }

  /api/v1/admin/vehicles/{vehicle_id}/unpublish:
    parameters:
      - $ref: "#/components/parameters/VehicleId"
    post:
      tags: [Admin Vehicles]
      summary: 下架车型
      operationId: adminUnpublishVehicle
      security:
        - accessCookieAuth: []
      responses:
        "200":
          description: "data is { ok: true }"
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponse" }

  /api/v1/admin/vehicles/{vehicle_id}/duplicate:
    parameters:
      - $ref: "#/components/parameters/VehicleId"
    post:
      tags: [Admin Vehicles]
      summary: 复制车型
      operationId: adminDuplicateVehicle
      security:
        - accessCookieAuth: []
      responses:
        "200":
          description: data 为 Vehicle
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponse" }

  /api/v1/admin/vehicles/{vehicle_id}/detail-images:
    parameters:
      - $ref: "#/components/parameters/VehicleId"
    get:
      tags: [Admin Vehicles]
      summary: 获取车型详情图
      operationId: adminGetVehicleDetailImages
      security:
        - accessCookieAuth: []
      responses:
        "200":
          description: data 为 VehicleDetailImage[]
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponse" }
    put:
      tags: [Admin Vehicles]
      summary: 保存车型详情图
      operationId: adminSaveVehicleDetailImages
      security:
        - accessCookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/VehicleDetailImagesRequest" }
      responses:
        "200":
          description: data 为 VehicleDetailImage[]
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponse" }

  /api/v1/admin/categories:
    get:
      tags: [Admin Categories]
      summary: 查询管理端分类列表
      operationId: adminListCategories
      security:
        - accessCookieAuth: []
      parameters:
        - $ref: "#/components/parameters/Keyword"
        - $ref: "#/components/parameters/CategoryLevelQuery"
        - $ref: "#/components/parameters/CategoryStatusQuery"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/SortField"
        - $ref: "#/components/parameters/SortOrder"
      responses:
        "200":
          description: data 为 ListResult<Category>
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponse" }
    post:
      tags: [Admin Categories]
      summary: 创建分类
      operationId: adminCreateCategory
      security:
        - accessCookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CategoryCreateRequest" }
      responses:
        "200":
          description: data 为 Category
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponse" }

  /api/v1/admin/categories/{category_id}:
    parameters:
      - $ref: "#/components/parameters/CategoryId"
    put:
      tags: [Admin Categories]
      summary: 更新分类
      operationId: adminUpdateCategory
      security:
        - accessCookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CategoryUpdateRequest" }
      responses:
        "200":
          description: data 为 Category
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponse" }
        "404": { $ref: "#/components/responses/NotFoundError" }
    delete:
      tags: [Admin Categories]
      summary: 删除分类
      operationId: adminDeleteCategory
      security:
        - accessCookieAuth: []
      responses:
        "200":
          description: data 为 Category
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponse" }
        "404": { $ref: "#/components/responses/NotFoundError" }

  /api/v1/admin/system-settings:
    get:
      tags: [Admin System Settings]
      summary: 获取系统设置
      operationId: adminGetSystemSettings
      security:
        - accessCookieAuth: []
      responses:
        "200":
          description: data 为 SystemSettings；未创建时为空对象
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponse" }
    post:
      tags: [Admin System Settings]
      summary: 创建系统设置
      operationId: adminCreateSystemSettings
      security:
        - accessCookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SystemSettingsCreateRequest" }
      responses:
        "200":
          description: data 为 SystemSettings
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponse" }
    put:
      tags: [Admin System Settings]
      summary: 更新系统设置
      operationId: adminUpdateSystemSettings
      security:
        - accessCookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SystemSettingsUpdateRequest" }
      responses:
        "200":
          description: data 为 SystemSettings
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponse" }

  /api/v1/admin/param-templates/list:
    get:
      tags: [Admin Param Templates]
      summary: 查询参数模板列表
      operationId: adminListParamTemplates
      security:
        - accessCookieAuth: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: data 为 ListResult<ParamTemplateListItem>
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponse" }

  /api/v1/admin/param-templates:
    post:
      tags: [Admin Param Templates]
      summary: 创建参数模板
      operationId: adminCreateParamTemplate
      security:
        - accessCookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ParamTemplateRequest" }
      responses:
        "200":
          description: data 为 ParamTemplate
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponse" }

  /api/v1/admin/param-templates/{id}:
    parameters:
      - $ref: "#/components/parameters/ParamTemplateId"
    put:
      tags: [Admin Param Templates]
      summary: 更新参数模板
      operationId: adminUpdateParamTemplate
      security:
        - accessCookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ParamTemplateRequest" }
      responses:
        "200":
          description: data 为 ParamTemplate
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponse" }
    delete:
      tags: [Admin Param Templates]
      summary: 删除参数模板
      operationId: adminDeleteParamTemplate
      security:
        - accessCookieAuth: []
      responses:
        "200":
          description: 当前实现 data 为空字符串
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponse" }

  /api/v1/admin/param-templates/getItemsById/{id}:
    parameters:
      - $ref: "#/components/parameters/ParamTemplateId"
    get:
      tags: [Admin Param Templates]
      summary: 获取参数模板及字段项
      operationId: adminGetParamTemplateItemsById
      security:
        - accessCookieAuth: []
      responses:
        "200":
          description: data 为 ParamTemplate
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponse" }

  /api/v1/admin/param-templates/getItemsbyId/{id}:
    parameters:
      - $ref: "#/components/parameters/ParamTemplateId"
    get:
      tags: [Admin Param Templates]
      summary: 获取参数模板及字段项（旧大小写兼容路径）
      operationId: adminGetParamTemplateItemsByIdLegacyCase
      deprecated: true
      security:
        - accessCookieAuth: []
      responses:
        "200":
          description: data 为 ParamTemplate
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponse" }

  /api/v1/admin/param-templates/getById/{id}:
    parameters:
      - $ref: "#/components/parameters/ParamTemplateId"
    get:
      tags: [Admin Param Templates]
      summary: 获取参数模板基础详情
      operationId: adminGetParamTemplateById
      security:
        - accessCookieAuth: []
      responses:
        "200":
          description: data 为 ParamTemplate
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponse" }

  /api/v1/admin/upload/images:
    post:
      tags: [Admin Media]
      summary: 上传图片
      operationId: adminUploadImage
      security:
        - accessCookieAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: 支持 jpeg/png/gif/webp，最大 10MB
      responses:
        "200":
          description: data 为 ImageUploadResult
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponse" }

  /api/v1/public/home:
    get:
      tags: [Public]
      summary: 获取公开首页数据
      operationId: publicHome
      responses:
        "200":
          description: data 为 PublicHomeData
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponse" }

  /api/v1/public/categories:
    get:
      tags: [Public]
      summary: 获取公开分类列表
      operationId: publicCategories
      responses:
        "200":
          description: data 为 ListResult<Category>，仅启用分类
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponse" }

  /api/v1/public/vehicles:
    get:
      tags: [Public]
      summary: 获取公开车型列表
      operationId: publicVehicles
      parameters:
        - $ref: "#/components/parameters/Keyword"
        - $ref: "#/components/parameters/CategoryIdQuery"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/SortField"
        - $ref: "#/components/parameters/SortOrder"
      responses:
        "200":
          description: data 为 ListResult<Vehicle>，仅 published 车型
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponse" }

  /api/v1/public/vehicles/{id}:
    parameters:
      - $ref: "#/components/parameters/PublicVehicleId"
    get:
      tags: [Public]
      summary: 获取公开车型详情
      operationId: publicVehicleDetail
      responses:
        "200":
          description: data 为 PublicVehicleDetailData
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponse" }
        "404": { $ref: "#/components/responses/NotFoundError" }

  /api/v1/public/vehicles/{id}/share-check:
    parameters:
      - $ref: "#/components/parameters/PublicVehicleId"
    get:
      tags: [Public]
      summary: 检查车型是否可分享
      operationId: publicVehicleShareCheck
      responses:
        "200":
          description: data 为 ShareCheckResult
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponse" }

  /api/v1/public/contact:
    get:
      tags: [Public]
      summary: 获取公开联系方式
      operationId: publicContact
      responses:
        "200":
          description: data 为 PublicContact；未配置时为空对象
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponse" }

components:
  securitySchemes:
    accessCookieAuth:
      type: apiKey
      in: cookie
      name: access_token
      description: 登录成功后由服务端写入的 httpOnly Access Token Cookie
    refreshCookieAuth:
      type: apiKey
      in: cookie
      name: refresh_token
      description: 登录成功后由服务端写入的 httpOnly Refresh Token Cookie

  responses:
    AuthError:
      description: 未认证或 Token 无效
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    NotFoundError:
      description: 资源不存在
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }

  parameters:
    UserId:
      name: user_id
      in: path
      required: true
      schema: { type: string }
    VehicleId:
      name: vehicle_id
      in: path
      required: true
      schema: { type: string, format: uuid }
    PublicVehicleId:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }
    CategoryId:
      name: category_id
      in: path
      required: true
      schema: { type: string, format: uuid }
    ParamTemplateId:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }
    Keyword:
      name: keyword
      in: query
      required: false
      schema: { type: string }
    CategoryIdQuery:
      name: categoryId
      in: query
      required: false
      schema: { type: string, format: uuid }
    VehicleStatusQuery:
      name: status
      in: query
      required: false
      schema: { $ref: "#/components/schemas/VehicleStatus" }
    CategoryLevelQuery:
      name: level
      in: query
      required: false
      schema:
        type: integer
        enum: [1, 2]
    CategoryStatusQuery:
      name: status
      in: query
      required: false
      schema: { $ref: "#/components/schemas/EnabledStatus" }
    Page:
      name: page
      in: query
      required: false
      schema: { type: integer, minimum: 1, default: 1 }
    PageSize:
      name: pageSize
      in: query
      required: false
      schema: { type: integer, minimum: 1, maximum: 100, default: 10 }
    SortField:
      name: sortField
      in: query
      required: false
      schema:
        type: string
        enum: [createdAt]
    SortOrder:
      name: sortOrder
      in: query
      required: false
      schema:
        type: string
        enum: [asc, desc]

  schemas:
    ApiResponse:
      type: object
      required: [code, message, data, requestId, timestamp]
      properties:
        code:
          type: string
          example: "000000"
        message:
          type: string
          example: success
        data:
          nullable: true
          description: 具体结构见接口响应描述及下方业务 Schema
        requestId:
          type: string
        timestamp:
          type: string
          format: date-time

    ErrorResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponse"
        - type: object
          properties:
            code:
              type: string
              enum: [A00001, A00004, B00001, C00002, M00001, D00001, D00002]
            data:
              nullable: true
              example: null

    HealthData:
      type: object
      required: [status, message, ossReady]
      properties:
        status: { type: string, example: ok }
        message: { type: string, example: API is running }
        ossReady: { type: boolean }

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username: { type: string, example: admin }
        password: { type: string, format: password }

    LoginResult:
      type: object
      required: [expiresIn]
      properties:
        expiresIn:
          type: integer
          description: Access Token 有效期，单位秒
          example: 7200

    AdminUser:
      type: object
      required: [id, username, role, createdAt, updatedAt]
      properties:
        id: { type: string, format: uuid }
        username: { type: string }
        role:
          type: string
          enum: [super_admin, editor]
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    PageMeta:
      type: object
      required: [page, pageSize, total, totalPages]
      properties:
        page: { type: integer, example: 1 }
        pageSize: { type: integer, example: 10 }
        total: { type: integer, example: 42 }
        totalPages: { type: integer, example: 5 }

    ListResult:
      type: object
      required: [list, page]
      properties:
        list:
          type: array
          items: { type: object }
        page:
          $ref: "#/components/schemas/PageMeta"

    VehicleStatus:
      type: string
      enum: [draft, published, unpublished, deleted]

    PriceMode:
      type: string
      enum: [show_price, phone_inquiry]

    EnabledStatus:
      type: integer
      enum: [0, 1]
      description: 1 启用，0 停用

    Vehicle:
      type: object
      required:
        - id
        - name
        - coverMediaId
        - priceMode
        - msrpPrice
        - status
        - sellingPoints
        - sortOrder
        - createdAt
        - updatedAt
      properties:
        id: { type: string, format: uuid }
        categoryId: { type: string, format: uuid, nullable: true }
        categoryName:
          type: string
          description: 管理端列表补充字段
        name: { type: string, example: 电动三轮车 A1 }
        coverMediaId: { type: string, format: uuid }
        coverImageUrl: { type: string, format: uri }
        priceMode: { $ref: "#/components/schemas/PriceMode" }
        msrpPrice:
          type: integer
          minimum: 0
          example: 399900
        status: { $ref: "#/components/schemas/VehicleStatus" }
        sellingPoints: { type: string }
        sortOrder: { type: integer, minimum: 0 }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    VehicleCreateRequest:
      type: object
      required: [name, coverMediaId, priceMode, msrpPrice, sellingPoints, sortOrder]
      properties:
        name: { type: string }
        categoryId: { type: string, format: uuid, nullable: true }
        coverMediaId: { type: string, format: uuid }
        priceMode: { $ref: "#/components/schemas/PriceMode" }
        msrpPrice: { type: integer, minimum: 0 }
        sellingPoints: { type: string }
        sortOrder: { type: integer, minimum: 0 }

    VehicleUpdateRequest:
      type: object
      properties:
        name: { type: string }
        categoryId: { type: string, format: uuid, nullable: true }
        coverMediaId: { type: string, format: uuid }
        priceMode: { $ref: "#/components/schemas/PriceMode" }
        msrpPrice: { type: integer, minimum: 0 }
        sellingPoints: { type: string }
        sortOrder: { type: integer, minimum: 0 }

    VehicleBatchStatusRequest:
      type: object
      required: [ids, status]
      properties:
        ids:
          type: array
          items: { type: string, format: uuid }
        status:
          type: string
          enum: [published, unpublished]

    VehicleDetailImage:
      type: object
      required: [mediaId, url, sortOrder]
      properties:
        mediaId: { type: string, format: uuid }
        url: { type: string, format: uri }
        sortOrder: { type: integer, minimum: 0 }

    VehicleDetailImagesRequest:
      type: object
      required: [images]
      properties:
        images:
          type: array
          items:
            type: object
            required: [mediaId]
            properties:
              mediaId: { type: string, format: uuid }

    Category:
      type: object
      required: [id, name, level, status, sortOrder, createdAt, updatedAt]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        parentId: { type: string, format: uuid, nullable: true }
        parentName: { type: string }
        level:
          type: integer
          enum: [1, 2]
        status: { $ref: "#/components/schemas/EnabledStatus" }
        sortOrder: { type: integer, minimum: 1 }
        iconMediaId: { type: string, format: uuid, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    CategoryCreateRequest:
      type: object
      required: [name, level, status, sortOrder]
      properties:
        name: { type: string }
        parentId:
          type: string
          format: uuid
          nullable: true
          description: 二级分类必填
        level:
          type: integer
          enum: [1, 2]
        status: { $ref: "#/components/schemas/EnabledStatus" }
        sortOrder: { type: integer, minimum: 1 }

    CategoryUpdateRequest:
      type: object
      properties:
        name: { type: string }
        parentId: { type: string, format: uuid, nullable: true }
        level:
          type: integer
          enum: [1, 2]
        status: { $ref: "#/components/schemas/EnabledStatus" }
        sortOrder: { type: integer, minimum: 1 }

    ParamTemplateItem:
      type: object
      required: [fieldKey, fieldName, fieldType, required, display, sortOrder]
      properties:
        id: { type: string, format: uuid }
        templateId: { type: string, format: uuid }
        fieldKey: { type: string, example: battery_capacity }
        fieldName: { type: string, example: 电池容量 }
        fieldType:
          type: string
          enum: [text, number, single_select]
        unit: { type: string, nullable: true, example: Ah }
        required:
          type: integer
          enum: [0, 1]
        display:
          type: integer
          enum: [0, 1]
        sortOrder: { type: integer, minimum: 0 }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    ParamTemplate:
      type: object
      required: [name, categoryId, status, items]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        categoryId: { type: string, format: uuid }
        status: { $ref: "#/components/schemas/EnabledStatus" }
        items:
          type: array
          items: { $ref: "#/components/schemas/ParamTemplateItem" }
        itemNum:
          type: integer
          description: 列表接口补充字段
        categoryName:
          type: string
          description: 列表接口补充字段
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    ParamTemplateRequest:
      type: object
      required: [name, categoryId, status, items]
      properties:
        name: { type: string }
        categoryId: { type: string, format: uuid }
        status: { $ref: "#/components/schemas/EnabledStatus" }
        items:
          type: array
          items: { $ref: "#/components/schemas/ParamTemplateItem" }

    SystemSettings:
      type: object
      required: [id, companyName, defaultPriceMode, updatedAt]
      properties:
        id: { type: integer, example: 1 }
        companyName: { type: string }
        customerServicePhone: { type: string, nullable: true }
        customerServiceWechat: { type: string, nullable: true }
        defaultPriceMode: { $ref: "#/components/schemas/PriceMode" }
        disclaimerText: { type: string, nullable: true }
        defaultShareTitle: { type: string, nullable: true }
        defaultShareImage:
          type: string
          nullable: true
          description: 媒体 ID；当前部分实现会转成可访问地址
        defaultShareImageUrl: { type: string, format: uri }
        updatedAt: { type: string, format: date-time }

    SystemSettingsCreateRequest:
      type: object
      required: [companyName, defaultPriceMode]
      properties:
        companyName: { type: string }
        customerServicePhone: { type: string, nullable: true }
        customerServiceWechat: { type: string, nullable: true }
        defaultPriceMode: { $ref: "#/components/schemas/PriceMode" }
        disclaimerText: { type: string, nullable: true }
        defaultShareTitle: { type: string, nullable: true }
        defaultShareImage: { type: string, format: uuid, nullable: true }

    SystemSettingsUpdateRequest:
      type: object
      minProperties: 1
      properties:
        companyName: { type: string }
        customerServicePhone: { type: string, nullable: true }
        customerServiceWechat: { type: string, nullable: true }
        defaultPriceMode: { $ref: "#/components/schemas/PriceMode" }
        disclaimerText: { type: string, nullable: true }
        defaultShareTitle: { type: string, nullable: true }
        defaultShareImage: { type: string, format: uuid, nullable: true }

    ImageUploadResult:
      type: object
      required: [id, url, storageKey]
      properties:
        id: { type: string, format: uuid }
        url: { type: string, format: uri }
        storageKey:
          type: string
          example: images/20260315/8f0f2e92.jpg

    PublicContact:
      type: object
      properties:
        companyName: { type: string }
        customerServicePhone: { type: string, nullable: true }
        customerServiceWechat: { type: string, nullable: true }
        disclaimerText: { type: string, nullable: true }
        defaultShareTitle: { type: string, nullable: true }
        defaultShareImageUrl: { type: string, format: uri }

    PublicHomeData:
      type: object
      required: [banners, categories, vehicles, contact, zones]
      properties:
        banners:
          type: array
          items: { type: object, additionalProperties: true }
        categories:
          type: array
          items: { $ref: "#/components/schemas/Category" }
        vehicles:
          type: array
          items: { $ref: "#/components/schemas/Vehicle" }
        contact: { $ref: "#/components/schemas/PublicContact" }
        zones:
          type: array
          items: { type: object, additionalProperties: true }

    VehicleParamDisplay:
      type: object
      required: [fieldKey, fieldName, fieldType, valueText, sortOrder]
      properties:
        fieldKey: { type: string }
        fieldName: { type: string }
        fieldType:
          type: string
          enum: [text, number, single_select]
        unit: { type: string, nullable: true }
        valueText: { type: string }
        sortOrder: { type: integer }

    PublicVehicleDetailData:
      type: object
      required: [vehicle, contact, detailImages, params, emptyParamsText]
      properties:
        vehicle: { $ref: "#/components/schemas/Vehicle" }
        contact: { $ref: "#/components/schemas/PublicContact" }
        detailImages:
          type: array
          items: { type: string, format: uri }
        params:
          type: array
          items: { $ref: "#/components/schemas/VehicleParamDisplay" }
        emptyParamsText: { type: string }

    ShareCheckResult:
      type: object
      required: [available, title, imageUrl]
      properties:
        available: { type: boolean }
        message: { type: string }
        vehicleId: { type: string, format: uuid }
        title: { type: string, nullable: true }
        imageUrl: { type: string, format: uri }
