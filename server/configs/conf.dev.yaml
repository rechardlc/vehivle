# 开发环境配置（conf.dev.yaml）
# 敏感信息通过 .env.dev 或环境变量 VEHIVLE_* 注入，此处仅写非敏感默认值

app:
  env: dev
  port: 9999
  read_timeout: 30
  write_timeout: 30
  log_level: debug

database:
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: 300

redis:
  addr: localhost:6379
  db: 0
  timeout: 3

oss:
  sign_expire: 3600
  # 本地 MinIO：允许上传接口返回的直链匿名可读；生产环境务必保持 false（见 conf.prod.yaml）
  enable_public_read: true

jwt:
  expire_hours: 24
  refresh_expire_hours: 168